<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements</title>
    <link rel="stylesheet" th:href="@{/css/anoucements.css}">
</head>
<body style="background-image: url('/images/background.jpg');">

<a href="/" id="homeButton">
    <button class="home-button" id="home-button">
        <img src="/images/mainMenu_png/home-button.png" alt="return home" class="home-icon">
    </button>
</a>

<div class="container">
    <h1>Announcements</h1>

    <div class="rating-list">
        <div th:each="trip : ${trips}" th:remove="tag">
            <a th:if="${trip.tripVisible == true}" th:href="@{'/trips/' + ${trip.id}}" class="announcement-item">
                
                <div class="trip-main-info">
                    <span class="trip-destination" th:text="${trip.destination}">Klimczok</span>
                    <span class="trip-distance" th:text="${trip.distanceOfTrip}">9.24 km</span>
                </div>

                <div class="trip-creator-info">
                    <span class="label">Organized by:</span>
                    <span class="creator-name" th:text="${trip.owner.getCustomUserName()}">test</span>
                </div>

                <div class="trip-status-info" th:with="helperVar=${customUser.id + ',' + trip.id}">
                    <span class="trip-date" th:text="${#temporals.format(trip.tripDateTime, 'dd.MM.yyyy, HH:mm')}">25.07.2026, 07:45</span>
                    
                    <div class="status-icon-wrapper" th:with="helperVar=${customUser.id + ',' + trip.id}">
    <img src="/images/announcement/owner.png" 
         th:if="${trip.owner.id == customUser.id}"
         th:src="@{/images/announcement/owner.png}"
         alt="You are the owner" 
         title="You are the organizer of this trip" 
         class="status-icon">

    <img th:if="${trip.owner.id != customUser.id and !#lists.contains(flag,helperVar)}"
         th:src="@{/images/announcement/add.png}"
         alt="Join trip" 
         title="Click to view details and join this trip" 
         class="status-icon">

    <img th:if="${trip.getId() != customUser.getId() and #lists.contains(flag,helperVar)}"
         th:src="@{/images/announcement/ok.png}"
         alt="Already joined" 
         title="You are already registered for this trip" 
         class="status-icon">
</div>
                </div>

            </a>
        </div>
    </div>
</div>

<script type="text/javascript" th:src="@{/js/announcement.js}"></script>
</body>
</html>
