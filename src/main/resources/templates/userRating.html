<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/userRating.css}">
</head>
<body class="background-image" style="background-image: url('/images/background.jpg');">

<a href="/" id="homeButton">
    <button class="home-button" id="home-button">
        <img src="/images/mainMenu_png/home-button.png" alt="return home" class="home-icon">
    </button>
</a>

<div class="main-wrapper">
    
    <div class="container">
        <h1>Reviews &amp; Rates</h1>
        
        <div class="rating-list-wrapper">
            <div class="rating-item glass-panel" th:each="rate : ${userRating}">
                
                <div class="mark-section">
                    <span class="label">Score:</span>
                    <div id="stars">
                        <div th:each="i : ${#numbers.sequence(1, rate.getRating())}">
                            <i class="fas fa-star"></i>
                        </div>
                    </div>
                </div>

                <div class="comment-section">
                    <span class="label">Commentary:</span>
                    <p class="comment-text" th:text="${rate.getComment()}">rate description</p>
                </div>
                
            </div>
        </div>
    </div>

    <aside class="stats-container">
        <div class="stats-card glass-panel">
            <h3 class="sidebar-title">Rating Summary</h3>
            
            <div class="stat-item">
                <span class="stat-label">Average Rate</span>
                <p class="stat-value text-accent" th:text="${averageRate}">4.8/5</p>
                <div class="global-stars-visual">⭐⭐⭐⭐⭐</div>
            </div>
            
            <div class="stat-item-footer">
                <span class="stat-label">Total Marks</span>
                <p class="stat-count" th:text="${userRating.size()}">12</p>
            </div>
        </div>
    </aside>

</div>

</body>
</html>
