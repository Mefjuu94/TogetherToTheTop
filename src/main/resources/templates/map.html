<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Creator</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link type="text/css" th:href="@{/css/map.css}" rel="stylesheet"/>
</head>
<body>

    <div id="map"></div>

    <div id="app-container">

        <aside id="sidebar-left" class="glass-panel">
            <h3 class="panel-title">Route Planner</h3>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search places..."/>
                <button id="searchBtn">Search</button>
                <div id="searchResults" class="dropdown"></div>
            </div>

            <div id="routeInfo" class="stats-box">
                <div class="stat-item">
                    <span class="stat-label">DISTANCE</span>
                    <span id="distance" class="stat-value">0.00 km</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">DURATION</span>
                    <span id="duration" class="stat-value">0s</span>
                </div>
            </div>

            <div class="filter-section">
                <h4>Points of Interest (POI)</h4>
                <div id="poiFilters" class="checkbox-grid">
                    <label class="custom-checkbox"><input type="checkbox" id="restaurant"> <span>🍽️ Restaurants</span></label>
                    <label class="custom-checkbox"><input type="checkbox" id="cafe"> <span>☕ Cafes</span></label>
                    <label class="custom-checkbox"><input type="checkbox" id="parking" checked> <span>🅿️ Parking</span></label>
                    <label class="custom-checkbox"><input type="checkbox" id="school" checked> <span>🏫 Schools</span></label>
                    <label class="custom-checkbox"><input type="checkbox" id="hospital" checked> <span>🏥 Hospitals</span></label>
                    <label class="custom-checkbox"><input type="checkbox" id="peak" checked> <span>⛰️ Peaks</span></label>
                    <label class="custom-checkbox"><input type="checkbox" id="generalPoi"> <span>📍 General POIs</span></label>
                </div>
            </div>

            <button id="addSavedWaypointBtn" class="btn-secondary">Add Saved Waypoint</button>
            
            <div id="waypoints-section">
                <h4>Waypoints :</h4>
                <div id="waypointsContainer">
                    <ul id="waypointsList"></ul>
                </div>
            </div>
        </aside>

        <aside id="sidebar-right" class="glass-panel">
            <h3 class="panel-title">Announcement Information</h3>
            
            <div th:if="${array}" class="info-messages">
                <p th:each="tekst: ${array}" th:text="${tekst}"></p>
            </div>

            <form id="creatorForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="description">Describe your trip:</label>
                    <textarea id="description" rows="5" maxlength="1000" placeholder="Description of destination, route, etc. (max 1000 signs)"></textarea>
                </div>

                <div class="checkbox-options">
                    <div class="option-box">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="driver"> 
                            <span>🚗 I am driving a vehicle</span>
                        </label>
                        <div id="DriverPeopleInputLabel" class="sub-input" style="display: none;">
                            <label>Seats: <input type="number" id="DriverPeopleInput" min="1" max="99" value="1"></label>
                        </div>
                    </div>

                    <div class="option-box">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="animals"> 
                            <span>🐕 I tolerate animals</span>
                        </label>
                    </div>

                    <div class="option-box">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="closedGroupCheckbox"> 
                            <span>🔒 Closed group</span>
                        </label>
                        <div id="peopleInputLabel" class="sub-input" style="display: none;">
                            <label>Max people: <input type="number" id="peopleInput" min="1" max="99" value="1"></label>
                        </div>
                    </div>
                </div>

                <div class="form-group input-tile" id="destination-div">
                    <label for="dest">Destination</label>
                    <input type="text" id="dest" placeholder="Your exact destination"/>
                </div>

                <div class="form-group input-tile" id="time">
                    <label for="dateTime">Departure Time</label>
                    <input type="datetime-local" id="dateTime">
                </div>

                <button id="add_announcement" class="btn-primary" type="button">
                    Publish Announcement
                </button>
            </form>

            <form id="saveForm" action="/sendData" method="POST" style="display: none;">
                <input type="hidden" id="waypoints" name="waypoints">
                <input type="hidden" id="coordinatesOfTrip" name="coordinatesOfTrip">
                <input type="hidden" id="allRouteDuration" name="allRouteDuration">
                <input type="hidden" id="distanceOfTrip" name="distanceOfTrip">
                <input type="hidden" id="descriptionOfTrip" name="descriptionOfTrip">
                <input type="hidden" id="driverCheck" name="driverCheck">
                <input type="hidden" id="amountOfPeopleDriver" name="amountOfPeopleDriver">
                <input type="hidden" id="isCheckedAnimals" name="isCheckedAnimals">
                <input type="hidden" id="isCheckedGroup" name="isCheckedGroup">
                <input type="hidden" id="amountOfPeopleInGroup" name="amountOfPeopleInGroup">
                <input type="hidden" id="destination" name="destination">
                <input type="hidden" id="date" name="date">
                <input type="hidden" id="jsonGeometryWaypoints" name="jsonGeometryWaypoints">
                <input type="hidden" id="waypointsLength" name="waypointsLength">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
        </aside>
    </div>

    <script type="module" th:src="@{/js/map.js}"></script>
</body>
</html>
